version: '3.9'

services:
  # ── PostgreSQL 16 ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: bribox-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bribox
      POSTGRES_USER: bribox
      POSTGRES_PASSWORD: bribox_secret_2024
    ports:
      - "5435:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bribox"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: bribox-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Go API Server ─────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bribox-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=bribox
      - DB_PASSWORD=bribox_secret_2024
      - DB_NAME=bribox
      - REDIS_ADDR=redis:6379
      - PORT=8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── React Frontend ────────────────────────────────────────
  ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bribox-ui
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pg_data:
